<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-labelledby="title desc">
  <title id="title">ClearClaims mark</title>
  <desc id="desc">A transparent shield, roofline, and clear water drop mark.</desc>
